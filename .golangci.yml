version: "2"
linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  fast: false
  enable:
  # some descriptions are from: https://golangci-lint.run/docs/linters/ and https://dev.to/olegkovalov/go-linters-configuration-the-right-version-3jeo
    - asasalint        # Check for pass []any as any in variadic func(...any)
    - bidichk          # Checks for dangerous unicode character sequences
    - bodyclose        # Checks whether HTTP response body is closed successfully.
    - contextcheck     # Check whether the function uses a non-inherited context.
    - durationcheck    # Check for two durations multiplied together.
    - errname          # Checks `Err-` prefix for var and `-Error` suffix for error type.
    - errorlint        # Suggests to use `%w` for error-wrapping.
    - gocritic         # It is a collection of checks that detect style, performance issues as well as some common programming errors
    - gomoddirectives  # Allow or ban replace directives in go.mod or force explanation for retract directives.
    - gosec            # Powerful security-oriented linter. But requires some time to configure it properly, see https://github.com/securego/gosec#available-rules
    - nakedret         # Finds naked/bare returns and requires changing them.
    - nilerr
    - nilnil
    - noctx            # Finds sending HTTP request without context.Context.
    - nolintlint       # Forces comment why another check is disabled.
    - prealloc         # Finds slices that could potentially be pre-allocated.
    - predeclared      # Finds shadowing of Go's predeclared identifiers.
    - reassign         # Checks that package variables are not reassigned. (like `io.EOF = nil`)
    - sqlclosecheck
    # Test-related checks. All of them are good.
    - tparallel
    - unconvert        # Remove unnecessary type conversions, make code cleaner
    - usestdlibvars    # Detect the possibility to use variables/constants from stdlib
    - wastedassign     # Finds wasted assignment statements
    - perfsprint       # checks whether the usage of Sprintf (and similar functions) are really needed, and suggests more performant alternatives
    - modernize        # A suite of analyzers that suggest simplifications to Go code, using modern language and library features.
    - tagalign         # Check that struct tags are well aligned.
    - nlreturn         # enforces adding a new line before return statements for better visibility
    - revive           # it's a complex linter, requires config
    - gocognit         # cognitive complexity (readability-correlated) - the primary complexity gate
    - funlen           # function length cap (orthogonal size signal)
    - nestif           # nesting depth cap (explicit arrow-code gate)
  disable:
    - depguard         # guard rails for what can be imported
    - err113           # reports incorrect error compairisons (== and !=, instead of errors.Is)
    - exhaustruct      # it makes sure that you define every attribute of a struct, makes code too verbose
    - gochecknoglobals # discourages the use of private global variables (does not apply to exported variables as those could make sense)
    - gocyclo          # simpler version of cyclop
    - lll              # line length limiter
    - misspell         # fixes common misspellings
    - mnd              # checks for magic numbers (constants without names), but this requires a huge list of exceptions to be "usable"
    - paralleltest     # warns about tests not marked for parallel execution (our tests depend on DB state so this is useless)
    - promlinter       # Lint your Prometheus metrics name.
    - tagliatelle      # struct tag linter, enforces naming conventions
    - testableexamples
    - thelper
    - unparam          # finds parameters in functions that always have the same value (so it's not really a parameter that's effectively used for anything)
    - varnamelen       # enforces *in certain cases* more verbose variable names (no random 'b' or 'c' as variable names)
    - wrapcheck        # checks that errors returned from packages are wrapped (eg. return fmt.Errorf("PACKAGE: %w", err) instead of return err)
    - wsl              # same as wsl_v5 but the legacy version
    - wsl_v5           # it enforces white space rules for better lisibility but it's a bit too constraining
    # these encourage good coding standards (gocognit/funlen/nestif are enabled above)
    - cyclop
    - maintidx

  exclusions:
    rules:
      # Table-driven tests legitimately run long; funlen targets production code.
      - path: _test\.go
        linters:
          - funlen
      # Tests legitimately use fake credentials, loose file/dir perms on temp
      # fixtures, and variable file paths; gosec has no value there.
      - path: _test\.go
        linters:
          - gosec
      # G101 fires on fixture/sample credentials (incl. the secret-detector's own
      # test data); G201/G202 fire on parameterized IN(...) queries where only
      # "?" placeholders are joined and every value is bound via args.
      - linters:
          - gosec
        text: "G(101|201|202)"

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment # this one could be useful as well for small optimizations
    staticcheck:
      # https://staticcheck.dev/docs/configuration/options/#initialisms
      # Default: ["ACL", "API", "ASCII", "CPU", "CSS", "DNS", "EOF", "GUID", "HTML", "HTTP", "HTTPS", "ID", "IP", "JSON", "QPS", "RAM", "RPC", "SLA", "SMTP", "SQL", "SSH", "TCP", "TLS", "TTL", "UDP", "UI", "GID", "UID", "UUID", "URI", "URL", "UTF8", "VM", "XML", "XMPP", "XSRF", "XSS", "SIP", "RTP", "AMQP", "DB", "TS"]
      # initialisms: []
      # SAxxxx checks in https://staticcheck.dev/docs/configuration/options/#checks
      # Default: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
      # NOTE: "all" means all checks, having a dash ("-") before the name means disable it explicitly
      # checks: []
      checks:
        - "all"
        - "-ST1000"
        - "-U1000"
    gocognit:
      # Ratchet baseline: 2026-06-29 worst offender is browse.List (39).
      # Paydown ladder: 25 -> 20 -> 15. Lower one rung as offenders are refactored; never regress.
      min-complexity: 25
    funlen:
      lines: 80
      statements: 60
    nestif:
      # Ratchet baseline: current worst is depth 5 (memory/write.go). Lower to 4 once paid down.
      min-complexity: 5
    tagalign:
      align: true
    varnamelen:
      min-name-length: 2
      max-distance: 10
      ignore-names:
        - i
    nakedret:
      # no naked returns
      max-func-lines: 1 # Default: 30
    misspell:
      ignore-rules:
        - responsable
    revive:
      # See https://github.com/mgechev/revive#command-line-flags
      # Maximum number of open files at the same time.
      # Defaults to unlimited.
      max-open-files: 2048
      enable-default-rules: false
      # Enable validation of comment directives.
      # See https://github.com/mgechev/revive#comment-directives
      directives:
        - name: specify-disable-reason
          severity: error
      # Sets the default failure confidence.
      # This means that linting errors with less than 0.8 confidence will be ignored.
      # Default: 0.8
      confidence: 0.8
      # Revive handles the default rules in a way that can be unexpected:
      # - If there are no explicit rules, the default rules are used.
      # - If there is at least one explicit rule, the default rules are not used, unless `enable-default-rules` is `true`.
      # Run `GL_DEBUG=revive golangci-lint run --enable-only=revive` to see default, all available rules, and enabled rules.
      rules:
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#argument-limit
        - name: argument-limit
          disabled: false
          exclude: [""]
          arguments: [10]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#bare-return
        - name: bare-return
          #disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#blank-imports
        - name: blank-imports
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#bool-literal-in-expr
        - name: bool-literal-in-expr
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#call-to-gc
        - name: call-to-gc
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#comment-spacings
        - name: comment-spacings
          disabled: false
          exclude: [""]
          arguments:
            - nolint # //nolint: is fine, as it is a directive
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#confusing-naming
        - name: confusing-naming
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#constant-logical-expr
        - name: constant-logical-expr
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#context-as-argument
        - name: context-as-argument
          disabled: false
          exclude: [""]
          arguments:
            - allow-types-before: "*testing.T,*github.com/user/repo/testing.Harness"
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#context-keys-type
        - name: context-keys-type
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#datarace
        - name: datarace
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#deep-exit
        - name: deep-exit
          disabled: true
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#defer
        - name: defer
          disabled: false
          exclude: [""]
          arguments: []
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#dot-imports
        - name: dot-imports
          disabled: false
          exclude: [""]
          arguments: [] # can specify allowed packages here
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#duplicated-imports
        - name: duplicated-imports
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#early-return
        - name: early-return
          disabled: false
          exclude: [""]
          arguments:
            - "preserve-scope"
            - "allow-jump"
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#empty-block
        - name: empty-block
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#empty-lines
        - name: empty-lines
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#enforce-map-style
        - name: enforce-map-style
          disabled: false
          exclude: [""]
          arguments:
            - "make"
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#enforce-slice-style
        - name: enforce-slice-style
          disabled: false
          exclude: [""]
          arguments:
            - "literal"
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#enforce-switch-style
        - name: enforce-switch-style
          disabled: false
          exclude: [""]
          arguments: [] # ["allow-default-not-last", "allowNoDefault"]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#error-naming
        - name: error-naming
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#error-return
        - name: error-return
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#error-strings
        - name: error-strings
          disabled: false
          exclude: [""]
          arguments:
            - "xerrors.New"
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#errorf
        - name: errorf
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#exported
        - name: exported
          disabled: false
          exclude: [""]
          arguments:
            - "say-repetitive-instead-of-stutters"
            - "check-public-interface"
            - "disable-checks-on-constants"
            - "disable-checks-on-types"
            - "disable-checks-on-variables"
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#filename-format
        - name: filename-format
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#forbidden-call-in-wg-go
        - name: forbidden-call-in-wg-go
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#get-return
        - name: get-return
          disabled: true
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#identical-branches
        - name: identical-branches
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#identical-ifelseif-branches
        - name: identical-ifelseif-branches
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#identical-ifelseif-conditions
        - name: identical-ifelseif-conditions
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#identical-switch-branches
        - name: identical-switch-branches
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#identical-switch-conditions
        - name: identical-switch-conditions
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#if-return
        - name: if-return
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#import-alias-naming
        - name: import-alias-naming
          disabled: true
          exclude: [""]
          arguments: ["^[a-z][a-z0-9_]{0,}$"] # regexes for custom rules can be defined here
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#import-shadowing
        - name: import-shadowing
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#increment-decrement
        - name: increment-decrement
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#indent-error-flow
        - name: indent-error-flow
          disabled: false
          exclude: [""]
          arguments:
            - "preserve-scope"
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#inefficient-map-lookup
        - name: inefficient-map-lookup
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#max-control-nesting
        - name: max-control-nesting
          disabled: false
          exclude: [""]
          arguments: [5]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#max-public-structs
        - name: max-public-structs
          disabled: true
          exclude: [""]
          arguments: [10]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#modifies-parameter
        - name: modifies-parameter # might remove this
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#modifies-value-receiver
        - name: modifies-value-receiver
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#nested-structs
        - name: nested-structs
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#optimize-operands-order
        - name: optimize-operands-order
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#package-comments
        - name: package-comments
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#package-directory-mismatch
        - name: package-directory-mismatch
          disabled: true
          exclude: [""]
          arguments: [] # can put ingored directories here
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#package-naming
        - name: package-naming
          disabled: false
          exclude: [""]
          arguments: [] # can configure to skip certain checks
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#range
        - name: range
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#receiver-naming
        - name: receiver-naming
          disabled: false
          exclude: [""]
          arguments:
            - max-length: 2
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#redefines-builtin-id
        - name: redefines-builtin-id
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#redundant-build-tag
        - name: redundant-build-tag
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#redundant-import-alias
        - name: redundant-import-alias
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#redundant-test-main-exit
        - name: redundant-test-main-exit
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#string-format
        - name: string-format
          disabled: false
          exclude: [""]
          arguments:
            - - 'fmt.Errorf[0]'
              - '/(^|[^\.!?])$/'
              - must not end in punctuation
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#string-of-int
        - name: string-of-int
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#superfluous-else
        - name: superfluous-else
          disabled: false
          exclude: [""]
          arguments:
            - "preserve-scope"
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#time-date
        - name: time-date
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#time-equal
        - name: time-equal
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unchecked-type-assertion
        - name: unchecked-type-assertion
          disabled: false
          exclude: [""]
          arguments:
            - accept-ignored-assertion-result: true # the following is accepted to ignore this: "foo, _ := bar(.*Baz)"
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unconditional-recursion
        - name: unconditional-recursion
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unexported-naming
        - name: unexported-naming
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unexported-return
        - name: unexported-return
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unhandled-error
        - name: unhandled-error
          disabled: false
          exclude: [""]
          arguments:
            - "^fmt.Printf"
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unnecessary-format
        - name: unnecessary-format
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unnecessary-if
        - name: unnecessary-if
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unnecessary-stmt
        - name: unnecessary-stmt
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unreachable-code
        - name: unreachable-code
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#use-slices-sort
        - name: use-slices-sort
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unused-parameter
        - name: unused-parameter
          disabled: false
          exclude: [""]
          arguments: [] # can configure the allow regex
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#unused-receiver
        - name: unused-receiver
          disabled: false
          exclude: [""]
          arguments: [] # can configure the allow regex
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#use-any
        - name: use-any
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#use-fmt-print
        - name: use-fmt-print
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#use-slices-sort
        - name: use-slices-sort
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#use-waitgroup-go
        - name: use-waitgroup-go
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#useless-break
        - name: useless-break
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#useless-fallthrough
        - name: useless-fallthrough
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#var-declaration
        - name: var-declaration
          disabled: false
          exclude: [""]
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#var-naming
        - name: var-naming
          disabled: false
          exclude: [""]
          arguments: []
        # https://github.com/mgechev/revive/blob/HEAD/RULES_DESCRIPTIONS.md#waitgroup-by-value
        - name: waitgroup-by-value
          disabled: false
          exclude: [""]

formatters:
  enable:
    - gofmt
    - goimports
  settings: {}
