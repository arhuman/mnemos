version: 2

project_name: mnemos

before:
  hooks:
    - go mod tidy

builds:
  - id: mnemos
    main: ./cmd/mnemos
    binary: mnemos
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/arhuman/mnemos/internal/version.Version={{ .Version }}
      - -X github.com/arhuman/mnemos/internal/version.GitCommit={{ .ShortCommit }}
      - -X github.com/arhuman/mnemos/internal/version.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
